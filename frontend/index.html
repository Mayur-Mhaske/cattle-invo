<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>शेतकरी बिलिंग सिस्टम</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Marathi:ital@0;1&family=Noto+Sans+Devanagari:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon">🌾</div>
      <div>
        <div class="brand-title">शेतकरी बिलिंग</div>
        <div class="brand-sub">जनावरांचे खाद्य व्यवस्थापन</div>
      </div>
    </div>

    <nav class="nav">
      <a class="nav-item active" data-page="dashboard" onclick="showPage('dashboard')">
        <span class="nav-icon">📊</span> मुख्यपान
      </a>
      <a class="nav-item" data-page="newbill" onclick="showPage('newbill')">
        <span class="nav-icon">🧾</span> नवीन बिल
      </a>
      <a class="nav-item" data-page="bills" onclick="showPage('bills')">
        <span class="nav-icon">📋</span> सर्व बिले
      </a>
      <a class="nav-item" data-page="customers" onclick="showPage('customers')">
        <span class="nav-icon">👥</span> ग्राहक
      </a>
      <a class="nav-item" data-page="products" onclick="showPage('products')">
        <span class="nav-icon">📦</span> उत्पादने / गोदाम
      </a>
      <a class="nav-item" data-page="payments" onclick="showPage('payments')">
        <span class="nav-icon">💰</span> उधार / देयके
      </a>
      <a class="nav-item" data-page="expenses" onclick="showPage('expenses')">
        <span class="nav-icon">💸</span> खर्च व्यवस्थापन
      </a>
      <a class="nav-item" data-page="reports" onclick="showPage('reports')">
        <span class="nav-icon">📈</span> मासिक अहवाल
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="made-by">Made by <strong>Mayur Mhaske</strong></div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="page-title" id="pageTitle">मुख्यपान</div>
      <div class="topbar-right">
        <div class="date-display" id="dateDisplay"></div>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Pages load here -->
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box" id="modalBox"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/bills.js"></script>
  <script src="js/billslist.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/products.js"></script>
  <script src="js/payments.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
